<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      color: #0f0;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .version {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
      font-family: monospace;
    }
    #status {
      font-family: monospace;
      font-size: 12px;
      color: #0f0;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 16px;
      min-height: 40px;
      word-wrap: break-word;
    }
    .order-limit {
      margin-bottom: 12px;
    }
    .order-limit label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .order-limit .options {
      display: flex;
      gap: 8px;
    }
    .order-limit .options button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      background: #0d0d1a;
      color: #e0e0e0;
      transition: all 0.2s;
    }
    .order-limit .options button.selected {
      background: #0071dc;
      color: white;
      border-color: #0071dc;
    }
    .order-limit .options button:hover:not(.selected) {
      border-color: #0f0;
      color: #0f0;
    }
    #startBtn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      background: #0071dc;
      color: white;
    }
    #startBtn:hover { background: #005bb5; }
    #startBtn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Walmart Order Scraper</h1>
  <div class="version">v3.2 — Chrome Extension</div>
  <div id="status">Ready. Navigate to walmart.com/orders and click Start.</div>
  <div class="order-limit">
    <label>How many orders?</label>
    <div class="options">
      <button data-limit="10">10</button>
      <button data-limit="50" class="selected">50</button>
      <button data-limit="0">All</button>
    </div>
  </div>
  <button id="startBtn">Start Scraping</button>
  <button id="stopBtn" style="display:none; width:100%; padding:10px; font-size:14px; font-weight:600; border:none; border-radius:4px; cursor:pointer; background:#dc3545; color:white; margin-top:8px;">Stop</button>
  <div class="info">
    Exports all order types (in-store, delivery, pickup) to CSV.
  </div>
  <script src="popup.js"></script>
</body>
</html>
